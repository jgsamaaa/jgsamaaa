  <path d="M0 286C147 258 255 252 352 263C484 279 554 323 704 318C856 313 932 246 1084 236C1166 231 1232 243 1280 257" stroke="url(#accent)" stroke-width="2" opacity="0.85"/>

  <circle cx="1010" cy="86" r="126" fill="url(#moonGlow)"/>
  <circle cx="1010" cy="86" r="48" fill="#E0F2FE"/>
