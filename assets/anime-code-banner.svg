<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gabriel / JGsamaaa coding banner</title>
  <desc id="desc">A clean anime-inspired night banner with a moon, city horizon, code window, and manga panel lines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080A14"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="accent" x1="340" y1="86" x2="915" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 86) rotate(90) scale(126)">
      <stop stop-color="#F8FAFC" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#A78BFA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F8FAFC" fill-opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-40" y="-40" width="1360" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.42 0"/>
    </filter>
  </defs>

